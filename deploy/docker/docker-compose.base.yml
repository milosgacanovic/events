services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: dr_events_postgres
    environment:
      POSTGRES_DB: dr_events
      POSTGRES_USER: dr_events
      POSTGRES_PASSWORD: dr_events_password
    ports:
      - "15432:5432"
    volumes:
      - ../../data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dr_events -d dr_events"]
      interval: 10s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: dr_events_meili
    # Memory caps prevent the indexer's default ⅔-of-host-RAM grab from
    # paging the box into swap during reindex bursts (host OOMed 2026-05-11).
    mem_limit: 2g
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-change_me}
      MEILI_NO_ANALYTICS: "true"
      MEILI_MAX_TASK_DB_SIZE: "1073741824"
      MEILI_MAX_INDEXING_MEMORY: "268435456"
    # No `ports:` — Meili is only reachable via the Compose network
    # (`http://meilisearch:7700`), never from the public internet. The master
    # key used to leak via this port mapping when anyone could GET the
    # /indexes endpoint and brute-force / scrape it.
    volumes:
      - ../../data/meili:/meili_data
