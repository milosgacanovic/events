services:
  api_blue:
    build:
      context: ../..
      dockerfile: deploy/docker/api.Dockerfile
    container_name: dr_events_api_blue
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://dr_events:dr_events_password@postgres:5432/dr_events
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-change_me}
      UPLOADS_DIR: /app/uploads
      PUBLIC_BASE_URL: https://events.danceresource.org
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-https://sso.danceresource.org/realms/YOUR_REALM}
      KEYCLOAK_JWKS_URL: ${KEYCLOAK_JWKS_URL:-https://sso.danceresource.org/realms/YOUR_REALM/protocol/openid-connect/certs}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-YOUR_CLIENT_ID_OR_AUDIENCE}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-YOUR_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-danceresource}
      KEYCLOAK_ADMIN_URL: ${KEYCLOAK_ADMIN_URL:-}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-}
      SMTP_HOST: brevo-relay
      SMTP_PORT: 2525
      SMTP_FROM: noreply@danceresource.org
      SMTP_ADMIN_TO: hello@danceresource.org, milos@danceresource.org, milosgacanovic@gmail.com
      EVENTS_SERIES_GROUPING_ENABLED: ${EVENTS_SERIES_GROUPING_ENABLED:-false}
    networks:
      - default
      - mail-relay
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_started
    ports:
      - "13001:3001"
    volumes:
      - ../../data/uploads:/app/uploads

  web_blue:
    build:
      context: ../..
      dockerfile: deploy/docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
        NEXT_PUBLIC_KEYCLOAK_URL: ${NEXT_PUBLIC_KEYCLOAK_URL:-https://sso.danceresource.org}
        NEXT_PUBLIC_KEYCLOAK_REALM: ${KEYCLOAK_REALM:-YOUR_REALM}
        NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-YOUR_CLIENT_ID}
        NEXT_PUBLIC_KEYCLOAK_LOGIN_REDIRECT_PATH: ${NEXT_PUBLIC_KEYCLOAK_LOGIN_REDIRECT_PATH:-/auth/keycloak/callback}
        NEXT_PUBLIC_KEYCLOAK_LOGOUT_REDIRECT_PATH: ${NEXT_PUBLIC_KEYCLOAK_LOGOUT_REDIRECT_PATH:-/admin}
        NEXT_PUBLIC_MAP_TILE_URL: ${NEXT_PUBLIC_MAP_TILE_URL:-https://tile.openstreetmap.org/{z}/{x}/{y}.png}
        NEXT_PUBLIC_EVENTS_SERIES_GROUPING_ENABLED: ${EVENTS_SERIES_GROUPING_ENABLED:-false}
    container_name: dr_events_web_blue
    environment:
      NODE_ENV: development
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: /api
      INTERNAL_API_BASE_URL: http://api_blue:3001/api
      NEXT_PUBLIC_KEYCLOAK_URL: https://sso.danceresource.org
      NEXT_PUBLIC_KEYCLOAK_REALM: ${KEYCLOAK_REALM:-YOUR_REALM}
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-YOUR_CLIENT_ID}
      NEXT_PUBLIC_KEYCLOAK_LOGIN_REDIRECT_PATH: ${NEXT_PUBLIC_KEYCLOAK_LOGIN_REDIRECT_PATH:-/auth/keycloak/callback}
      NEXT_PUBLIC_KEYCLOAK_LOGOUT_REDIRECT_PATH: ${NEXT_PUBLIC_KEYCLOAK_LOGOUT_REDIRECT_PATH:-/admin}
      NEXT_PUBLIC_MAP_TILE_URL: ${NEXT_PUBLIC_MAP_TILE_URL:-https://tile.openstreetmap.org/{z}/{x}/{y}.png}
      NEXT_PUBLIC_EVENTS_SERIES_GROUPING_ENABLED: ${EVENTS_SERIES_GROUPING_ENABLED:-false}
    depends_on:
      - api_blue
    ports:
      - "13000:3000"

networks:
  mail-relay:
    external: true
