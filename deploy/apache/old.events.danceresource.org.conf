<VirtualHost *:80>
  ServerName old.events.danceresource.org
  RewriteEngine On
  RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
  ServerName old.events.danceresource.org
  SSLEngine on
  SSLCertificateFile /etc/letsencrypt/live/old.events.danceresource.org/fullchain.pem
  SSLCertificateKeyFile /etc/letsencrypt/live/old.events.danceresource.org/privkey.pem
  <Location "/">
    AuthType Basic
    AuthName "Archive"
    AuthUserFile /etc/apache2/.htpasswd-old-events
    Require valid-user
  </Location>
  ProxyPreserveHost On
  RequestHeader set X-Forwarded-Proto "https"
  RequestHeader set X-Forwarded-Port "443"
  ProxyPass / http://127.0.0.1:8082/
  ProxyPassReverse / http://127.0.0.1:8082/
  ErrorLog ${APACHE_LOG_DIR}/old.events.danceresource.org-error.log
  CustomLog ${APACHE_LOG_DIR}/old.events.danceresource.org-access.log combined
</VirtualHost>
</IfModule>
