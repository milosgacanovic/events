<VirtualHost *:80>
  ServerName beta.events.danceresource.org
  RewriteEngine On
  RewriteRule ^ https://events.danceresource.org%{REQUEST_URI} [END,NE,R=temporary]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
  ServerName beta.events.danceresource.org
  SSLEngine on
  SSLCertificateFile /etc/letsencrypt/live/beta.events.danceresource.org/fullchain.pem
  SSLCertificateKeyFile /etc/letsencrypt/live/beta.events.danceresource.org/privkey.pem
  Redirect temp / https://events.danceresource.org/
</VirtualHost>
</IfModule>
