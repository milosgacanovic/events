<VirtualHost *:80>
  ServerName beta.events.danceresource.org
  RewriteEngine On
  RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
  ServerName beta.events.danceresource.org

  SSLEngine on
  SSLCertificateFile /etc/letsencrypt/live/beta.events.danceresource.org/fullchain.pem
  SSLCertificateKeyFile /etc/letsencrypt/live/beta.events.danceresource.org/privkey.pem

  ProxyPreserveHost On
  RequestHeader set X-Forwarded-Proto "https"
  RequestHeader set X-Forwarded-Port "443"

  # Active upstream targets are selected by blue/green scripts via these vhost-scoped includes:
  #   /etc/apache2/sites-available/includes/dr_events_api_active.conf
  #   /etc/apache2/sites-available/includes/dr_events_web_active.conf
  IncludeOptional /etc/apache2/sites-available/includes/dr_events_api_active.conf
  IncludeOptional /etc/apache2/sites-available/includes/dr_events_web_active.conf

  ErrorLog ${APACHE_LOG_DIR}/beta.events.danceresource.org-error.log
  CustomLog ${APACHE_LOG_DIR}/beta.events.danceresource.org-access.log combined
</VirtualHost>
</IfModule>
