<VirtualHost *:80>
  ServerName events.danceresource.org
  RewriteEngine On
  RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
  ServerName events.danceresource.org

  SSLEngine on
  SSLCertificateFile /etc/letsencrypt/live/events.danceresource.org/fullchain.pem
  SSLCertificateKeyFile /etc/letsencrypt/live/events.danceresource.org/privkey.pem

  ProxyPreserveHost On
  RequestHeader set X-Forwarded-Proto "https"
  RequestHeader set X-Forwarded-Port "443"

  # Security headers (belt-and-braces fallback; API + Next.js also set their own
  # per-response headers — this covers any edge-case response that bypasses both).
  Header always set X-Frame-Options "DENY"
  Header always set X-Content-Type-Options "nosniff"
  Header always set Referrer-Policy "strict-origin-when-cross-origin"
  Header always set Permissions-Policy "camera=(), microphone=(), geolocation=(self), interest-cohort=()"
  Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
  # Only set CSP if the upstream did not (API and Next.js already set their own).
  Header setifempty Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://sso.danceresource.org https://nominatim.openstreetmap.org; frame-src 'self' https://sso.danceresource.org; object-src 'none'; base-uri 'self'; form-action 'self' https://sso.danceresource.org; frame-ancestors 'none'"

  # Active upstream targets are selected by blue/green scripts via these vhost-scoped includes:
  #   /etc/apache2/sites-available/includes/dr_events_api_active.conf
  #   /etc/apache2/sites-available/includes/dr_events_web_active.conf
  IncludeOptional /etc/apache2/sites-available/includes/dr_events_api_active.conf
  IncludeOptional /etc/apache2/sites-available/includes/dr_events_web_active.conf

  ErrorLog ${APACHE_LOG_DIR}/events.danceresource.org-error.log
  CustomLog ${APACHE_LOG_DIR}/events.danceresource.org-access.log combined
</VirtualHost>
</IfModule>
