<VirtualHost *:80>
  ServerName events.danceresource.org
  RewriteEngine On
  RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
  ServerName events.danceresource.org

  SSLEngine on
  SSLCertificateFile /etc/letsencrypt/live/events.danceresource.org/fullchain.pem
  SSLCertificateKeyFile /etc/letsencrypt/live/events.danceresource.org/privkey.pem

  ProxyPreserveHost On
  RequestHeader set X-Forwarded-Proto "https"
  RequestHeader set X-Forwarded-Port "443"

  # Security headers (belt-and-braces fallback; API + Next.js also set their own
  # per-response headers — this covers any edge-case response that bypasses both).
  Header always set X-Frame-Options "SAMEORIGIN"
  Header always set X-Content-Type-Options "nosniff"
  Header always set Referrer-Policy "strict-origin-when-cross-origin"
  Header always set Permissions-Policy "camera=(), microphone=(), geolocation=(self), interest-cohort=()"
  Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
  # Only set CSP if the upstream did not (API and Next.js already set their own).
  # Fallback CSP; Next.js sets its own per-response via next.config.mjs. Keep
  # the third-party allow-list in sync with that file (Google Fonts, GTM,
  # Cloudflare Web Analytics beacon).
  Header setifempty Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://sso.danceresource.org https://nominatim.openstreetmap.org https://www.google-analytics.com https://*.google-analytics.com https://www.googletagmanager.com https://cloudflareinsights.com https://*.cloudflareinsights.com; frame-src 'self' https://sso.danceresource.org https://www.googletagmanager.com; object-src 'none'; base-uri 'self'; form-action 'self' https://sso.danceresource.org; frame-ancestors 'self'"

  # Active upstream targets are selected by blue/green scripts via these vhost-scoped includes:
  #   /etc/apache2/sites-available/includes/dr_events_api_active.conf
  #   /etc/apache2/sites-available/includes/dr_events_web_active.conf
  IncludeOptional /etc/apache2/sites-available/includes/dr_events_api_active.conf
  IncludeOptional /etc/apache2/sites-available/includes/dr_events_web_active.conf

  ErrorLog ${APACHE_LOG_DIR}/events.danceresource.org-error.log
  CustomLog ${APACHE_LOG_DIR}/events.danceresource.org-access.log combined
</VirtualHost>
</IfModule>
